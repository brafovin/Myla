<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240" role="img" aria-label="Myla Logo – Sprechblase mit buntem Globus">
  <defs>
    <linearGradient id="bubbleStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF7E9D"/>
      <stop offset="0.5" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#4ECDC4"/>
    </linearGradient>
    <clipPath id="globeClip">
      <circle cx="120" cy="92" r="58"/>
    </clipPath>
  </defs>

  <!-- Sprechblase mit Schwanz unten links -->
  <path d="M68 28 H172 A44 44 0 0 1 216 72 V124 A44 44 0 0 1 172 168
           H96 L58 202 L80 168 H68 A44 44 0 0 1 24 124 V72 A44 44 0 0 1 68 28 Z"
        fill="#FFFFFF" stroke="url(#bubbleStroke)" stroke-width="7" stroke-linejoin="round"/>

  <!-- Bunter Globus -->
  <g clip-path="url(#globeClip)">
    <rect x="62"  y="34" width="19.4" height="116" fill="#FF7E9D"/>
    <rect x="81.4" y="34" width="19.3" height="116" fill="#FFA45C"/>
    <rect x="100.7" y="34" width="19.3" height="116" fill="#FFD166"/>
    <rect x="120" y="34" width="19.3" height="116" fill="#4ECDC4"/>
    <rect x="139.3" y="34" width="19.4" height="116" fill="#5B8DEF"/>
    <rect x="158.7" y="34" width="19.3" height="116" fill="#A78BFA"/>
    <!-- Globus-Gitternetz -->
    <g fill="none" stroke="#FFFFFF" stroke-width="4" opacity="0.9">
      <ellipse cx="120" cy="92" rx="23" ry="58"/>
      <line x1="120" y1="34" x2="120" y2="150"/>
      <line x1="62" y1="92" x2="178" y2="92"/>
      <line x1="62" y1="66" x2="178" y2="66"/>
      <line x1="62" y1="118" x2="178" y2="118"/>
    </g>
  </g>
  <!-- sauberer Außenring -->
  <circle cx="120" cy="92" r="58" fill="none" stroke="#FFFFFF" stroke-width="5"/>
</svg>
